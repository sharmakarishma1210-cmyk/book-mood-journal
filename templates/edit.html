<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Book</title>
    <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">Edit Book🖊️</h1>
      <form method="POST">
        <input type="text" name="title" value="{{ book.title }}" required />
        <input type="text" name="author" value="{{ book.author }}" required />
        <input type="text" name="mood" value="{{ book.mood }}" required />

        <input
          type="number"
          name="rating"
          value="{{ book.rating }}"
          min="1"
          max="5"
          step="0.1"
          required
        />

        <textarea
          name="quote"
          rows="4"
          placeholder="line that stayed with you.."
        >
        {{ book.quote }}
        </textarea>

        <button type="submit">Save Changes</button>
      </form>
    </div>
  </body>
</html>
